services:
  db:
    image: postgres:15-alpine
    container_name: gestion_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: gestion_integral_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestion_backend_prod
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=gestion_integral_db
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgrespassword}
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    depends_on:
      - db
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  caddy:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prod
    container_name: gestion_caddy_prod
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - backend
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true

volumes:
  pgdata_prod:
  static_volume:
  media_volume:
