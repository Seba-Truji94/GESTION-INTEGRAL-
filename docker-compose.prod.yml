version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gestion_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: gestion_integral_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestion_backend_prod
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=gestion_integral_db
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgrespassword}
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
    depends_on:
      - db
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestion_frontend_prod
    restart: always
    # This container builds the static files. 
    # In production, we'll serve them via the main nginx container.
    volumes:
      - frontend_build:/usr/share/nginx/html

  nginx:
    image: nginx:alpine
    container_name: gestion_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend

volumes:
  pgdata_prod:
  static_volume:
  media_volume:
  frontend_build:
