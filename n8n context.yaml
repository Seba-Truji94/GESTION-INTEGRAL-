Ahora en server, todo en orden:


# 1. Crear red proxy (si no existe)
docker network create proxy 2>/dev/null || true

# 2. Crear Caddy global
mkdir -p ~/caddy

cat > ~/caddy/Caddyfile << 'EOF'
{
    email admin@kruxel.cl
}

n8n.kruxel.cl {
    reverse_proxy n8n-n8n-1:5678
}

ryfbanqueteria.kruxel.cl {
    reverse_proxy gestion_caddy_prod:80
}
EOF

cat > ~/caddy/docker-compose.yml << 'EOF'
services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy_global
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  caddy_data:
  caddy_config:
EOF

# 3. Conectar n8n a red proxy
docker network connect proxy n8n-n8n-1 2>/dev/null || true

# 4. Bajar Caddy del proyecto y rebuilding con nuevo Caddyfile
cd ~/GESTION-INTEGRAL-
docker compose -f docker-compose.prod.yml stop caddy
docker compose -f docker-compose.prod.yml rm -f caddy
docker compose -f docker-compose.prod.yml up -d --build caddy

# 5. Subir Caddy global
cd ~/caddy
docker compose up -d
